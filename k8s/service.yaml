apiVersion: v1
kind: Service
metadata:
  name: garage-app-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internal"
spec:
  type: LoadBalancer
  selector:
    app: garage-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
